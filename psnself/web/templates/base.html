<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}psnSELF{% endblock %}</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect x='4' y='5' width='16' height='12' rx='3' fill='%2300c8a0'/%3E%3Crect x='1' y='9' width='5' height='8' rx='2.5' fill='%2300c8a0'/%3E%3Crect x='18' y='9' width='5' height='8' rx='2.5' fill='%2300c8a0'/%3E%3Crect x='6' y='10' width='3' height='2' rx='.5' fill='%231a1a1e'/%3E%3Crect x='7' y='9' width='1' height='4' rx='.3' fill='%231a1a1e'/%3E%3Ccircle cx='17' cy='11' r='1' fill='%231a1a1e'/%3E%3Ccircle cx='17' cy='15' r='1' fill='%231a1a1e'/%3E%3Ccircle cx='15' cy='13' r='1' fill='%231a1a1e'/%3E%3Ccircle cx='19' cy='13' r='1' fill='%231a1a1e'/%3E%3Crect x='10' y='11' width='2' height='1' rx='.5' fill='%231a1a1e'/%3E%3Crect x='12' y='11' width='2' height='1' rx='.5' fill='%231a1a1e'/%3E%3C/svg%3E">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/htmx.org@1.9.10"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #1a1a1e;
    --surface:   #282830;
    --primary:   #5a8aaa;
    --secondary: #4a6a80;
    --accent:    #00c8a0;
    --fg:        #d0d0d0;
    --fg-dim:    #8a8a92;
    --err:       #d05050;
    --plat:      #b0b0e0;
    --platinum:  #b0b0e0;
    --gold:      #d4af37;
    --silver:    #c8c8ce;
    --bronze:    #cd7f32;
  }
  * { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  body { background: var(--bg); color: var(--fg); }

  /* --- terminal "border-title" seam --- */
  .term-card {
    position: relative;
    border: 1px solid var(--primary);
    background: var(--bg);
  }
  .term-card__title {
    position: absolute;
    top: -0.65em;
    left: 1rem;
    background: var(--bg);
    color: var(--primary);
    padding: 0 0.5rem;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    font-weight: 700;
    text-transform: uppercase;
  }
  .term-card__title.accent { color: var(--accent); }

  .cursor {
    display: inline-block;
    width: 0.55em;
    height: 1em;
    background: var(--accent);
    vertical-align: -0.15em;
    animation: blink 1.1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--secondary); }

  a.nav-link { color: var(--fg-dim); }
  a.nav-link:hover, a.nav-link.active { color: var(--accent); }

  .bar-track { background: var(--surface); }
  .bar-fill { background: var(--accent); }

  table.term-table th { color: var(--primary); font-weight: 700; border-bottom: 1px solid var(--secondary); }
  table.term-table td { color: var(--fg); }
  table.term-table tr:hover td { background: var(--surface); }

  .htmx-indicator { opacity: 0; transition: opacity 150ms; }
  .htmx-request .htmx-indicator { opacity: 1; }
  .htmx-request.htmx-indicator { opacity: 1; }
</style>
{% block head %}{% endblock %}
</head>
<body class="min-h-screen">
  <header class="border-b" style="border-color: var(--secondary);">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between gap-2">
      <a href="/" class="text-base sm:text-lg font-extrabold tracking-wide whitespace-nowrap" style="color: var(--fg);">
        psn<span style="color: var(--accent);">SELF</span><span class="cursor"></span>
      </a>
      <nav class="flex flex-wrap gap-x-4 gap-y-1 sm:gap-6 text-xs sm:text-sm uppercase tracking-wide items-center justify-end">
        <a href="/" class="nav-link {% if active == 'dashboard' %}active{% endif %}">Dashboard</a>
        <a href="/friends" class="nav-link {% if active == 'friends' %}active{% endif %}">Friends</a>
        <a href="/auth" class="nav-link {% if active == 'auth' %}active{% endif %}" style="color: var(--fg-dim);">
          {% if authenticated %}
            <span style="color: var(--accent);">✓</span> {{ online_id }}
          {% else %}
            Auth
          {% endif %}
        </a>
      </nav>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="max-w-7xl mx-auto px-4 sm:px-6 py-6 text-xs flex gap-2 flex-wrap" style="color: var(--fg-dim);">
    <span>Forked from</span>
    <a href="https://github.com/TripShuti/psnTUI" target="_blank" style="color: var(--primary);">psnTUI</a>
    <span>·</span>
    <span>Source:</span>
    <a href="https://github.com/TripShuti/psnSELF" target="_blank" style="color: var(--primary);">psnSELF</a>
  </footer>

</body>
</html>
